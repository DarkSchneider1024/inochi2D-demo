<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Carrot v2 全身分層動態預覽</title>
  <link rel="stylesheet" href="style.css">
  <style>
    #rig.carrot-v2 {
      width: min(74vmin * 0.4745, 285px);
      height: min(74vmin, 600px);
      aspect-ratio: 864/1821;
    }
  </style>
</head>
<body>
  <main>
    <header>
      <div>
        <small>CARROT PUPPET LAB / PIPELINE OUTPUT</small>
        <h1>作品三 (V2 全身分層模型)</h1>
        <div class="tabs">
          <a class="tab-btn" href="index.html">作品一・二</a>
          <a class="tab-btn active" href="carrot_v2.html">作品三 (V2 全身分層)</a>
        </div>
      </div>
      <a class="model-link" href="../models/carrot_v2.psd" download>下載 .psd (29 圖層)</a>
    </header>

    <section class="workspace">
      <section id="stage" aria-label="carrot v2 layered preview">
        <div id="rig" class="carrot-v2"></div>
        <em>MOVE POINTER<br><span>視差跟隨・自動呼吸・眨眼</span></em>
      </section>

      <aside>
        <section>
          <small>MOTION</small>
          <label>視差強度 <output id="p-out">14</output>
            <input id="parallax" type="range" min="0" max="30" step="1" value="14">
          </label>
          <label class="check"><input id="tracking" type="checkbox" checked> 滑鼠視差跟隨</label>
          <label class="check"><input id="breath" type="checkbox" checked> 呼吸</label>
          <label class="check"><input id="blink" type="checkbox" checked> 自動眨眼</label>
        </section>
        <section>
          <small>SOURCE</small>
          <h2>29 全畫布圖層</h2>
          <p>由 <code>vtuber-layered-character-prompt</code> pipeline 產出：零件圖 manifest 切圖 → layout 對齊 → pytoshop 組 PSD。本頁直接堆疊圖層 PNG，依深度群組做視差與呼吸。</p>
        </section>
        <section>
          <small>CURRENT STATE</small>
          <h2 id="state">IDLE</h2>
          <p id="hint">圖層載入中…</p>
        </section>
      </aside>
    </section>
  </main>
  <script src="carrot_v2.js"></script>
</body>
</html>
