<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Carrot VTuber｜v3 分層動態預覽</title>
  <link rel="stylesheet" href="style.css">
  <style>
    #rig.carrot-v3 {
      width: min(74vmin * 0.3857, 232px);
      height: min(74vmin, 600px);
      aspect-ratio: 1080/2800;
    }
  </style>
</head>
<body>
  <main>
    <header>
      <div>
        <small>CARROT PUPPET LAB / EXPLODED-VIEW PIPELINE</small>
        <h1>Carrot v3 全身分層模型</h1>
      </div>
      <a class="model-link" href="../models/carrot_v3.psd" download>下載 .psd (28 圖層)</a>
    </header>

    <section class="workspace">
      <section id="stage" aria-label="carrot v3 layered preview">
        <div id="rig" class="carrot-v3"></div>
        <em>MOVE POINTER<br><span>視差跟隨・自動呼吸・眨眼</span></em>
      </section>

      <aside>
        <section>
          <small>MOTION</small>
          <label>視差強度 <output id="p-out">14</output>
            <input id="parallax" type="range" min="0" max="30" step="1" value="14">
          </label>
          <label class="check"><input id="tracking" type="checkbox" checked> 滑鼠視差跟隨</label>
          <label class="check"><input id="breath" type="checkbox" checked> 呼吸</label>
          <label class="check"><input id="blink" type="checkbox" checked> 自動眨眼</label>
        </section>
        <section>
          <small>SOURCE</small>
          <h2>28 全畫布圖層</h2>
          <p>Gemini 同比例炸開圖 → manifest 自動切圖(flood 去背 + defringe)→ layout 對齊 → pytoshop 組 PSD。月藏藏流拆件:光頭底、獨立眼嘴、三段手臂、吊帶襪整腿。</p>
        </section>
        <section>
          <small>CURRENT STATE</small>
          <h2 id="state">IDLE</h2>
          <p id="hint">圖層載入中…</p>
        </section>
      </aside>
    </section>
  </main>
  <script src="carrot_v3.js"></script>
</body>
</html>
