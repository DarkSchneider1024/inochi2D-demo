<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Lily VTuber｜v1 分層動態預覽</title>
  <link rel="stylesheet" href="style.css">
  <style>
    #rig.lily-v1 {
      width: min(74vmin * 0.3724, 224px);
      height: min(74vmin, 600px);
      aspect-ratio: 1080/2900;
    }
  </style>
</head>
<body>
  <main>
    <header>
      <div>
        <small>LILY PUPPET LAB / EXPLODED-VIEW PIPELINE</small>
        <h1>Lily v1 全身分層模型</h1>
      </div>
      <a class="model-link" href="../models/lily_v1.psd" download>下載 .psd</a>
    </header>

    <section class="workspace">
      <section id="stage" aria-label="lily v1 layered preview">
        <div id="rig" class="lily-v1"></div>
        <em>MOVE POINTER<br><span>視差跟隨・自動呼吸</span></em>
      </section>

      <aside>
        <section>
          <small>MOTION</small>
          <label>視差強度 <output id="p-out">14</output>
            <input id="parallax" type="range" min="0" max="30" step="1" value="14">
          </label>
          <label class="check"><input id="tracking" type="checkbox" checked> 滑鼠視差跟隨</label>
          <label class="check"><input id="breath" type="checkbox" checked> 呼吸</label>
        </section>
        <section>
          <small>SOURCE</small>
          <h2>單層完整插圖</h2>
          <p>agy(Nano Banana)生成的完整比例插圖直接作為底圖,不再切件重拼——黑長直、高挑蜂腰、深藍削肩洋裝美女角色。獨立分件的手腳/表情動作留待後續用局部重繪的方式另外處理。</p>
        </section>
        <section>
          <small>CURRENT STATE</small>
          <h2 id="state">IDLE</h2>
          <p id="hint">圖層載入中…</p>
        </section>
      </aside>
    </section>
  </main>
  <script src="lily_v1.js"></script>
</body>
</html>
