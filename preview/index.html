<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Carrot Inochi2D Native Head Rig Preview</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main>
    <header>
      <div>
        <small>CARROT PUPPET LAB / NATIVE INOCHI2D</small>
        <h1 id="main-title">作品一 (頭部綁定預覽)</h1>
        <div class="tabs">
          <button class="tab-btn active" data-work="1">作品一 (頭部模組)</button>
          <button class="tab-btn" data-work="2">作品二 (全身分層 PSD)</button>
        </div>
      </div>
      <a id="download-btn" class="model-link" href="../models/carrot_vtuber_detailed_head.inx" download>下載 .inx 模型</a>
    </header>

    <section class="workspace">
      <section id="stage" aria-label="layered head rig preview">
        <div id="rig" class="work-1">
        </div>
        <em>MOVE POINTER<br><span>滑鼠移動控制 Angle X / Y</span></em>
      </section>

      <aside>
        <section>
          <small>ANGLE PARAMETERS</small>
          <label>Angle X <output id="x-out">0.00</output>
            <input id="angle-x" type="range" min="-1" max="1" step="0.01" value="0">
          </label>
          <label>Angle Y <output id="y-out">0.00</output>
            <input id="angle-y" type="range" min="-1" max="1" step="0.01" value="0">
          </label>
          <label class="check"><input id="tracking" type="checkbox" checked> 滑鼠追蹤</label>
        </section>

        <section>
          <small>NATIVE MODEL</small>
          <p>這頁是瀏覽器預覽；真正的高密度 ArtMesh、9 點 Angle X/Y 變形資料在 <code>carrot_vtuber_detailed_head.inx</code>。</p>
          <p>已分層：臉型、左右眼、左右眉、鼻、嘴、前髮、後髮。</p>
        </section>

        <section>
          <small>CURRENT STATE</small>
          <h2 id="state">CENTER</h2>
          <p>此版不再使用九張角度圖切換；畫面由分層素材即時位移、縮放與透視補償。</p>
        </section>
      </aside>
    </section>
  </main>
  <script src="app.js"></script>
</body>
</html>
