<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Lily VTuber｜v1 分層動態預覽</title>
  <link rel="stylesheet" href="style.css">
  <style>
    #rig.lily-v1 {
      width: min(74vmin * 0.3724, 224px);
      height: min(74vmin, 600px);
      aspect-ratio: 1080/2900;
    }
  </style>
</head>
<body>
  <main>
    <header>
      <div>
        <small>LILY PUPPET LAB / EXPLODED-VIEW PIPELINE</small>
        <h1>Lily v1 全身分層模型</h1>
      </div>
      <a class="model-link" href="../models/lily_v1.psd" download>下載 .psd (26 圖層)</a>
    </header>

    <section class="workspace">
      <section id="stage" aria-label="lily v1 layered preview">
        <div id="rig" class="lily-v1"></div>
        <em>MOVE POINTER<br><span>視差跟隨・自動呼吸・眨眼</span></em>
      </section>

      <aside>
        <section>
          <small>MOTION</small>
          <label>視差強度 <output id="p-out">14</output>
            <input id="parallax" type="range" min="0" max="30" step="1" value="14">
          </label>
          <label class="check"><input id="tracking" type="checkbox" checked> 滑鼠視差跟隨</label>
          <label class="check"><input id="breath" type="checkbox" checked> 呼吸</label>
          <label class="check"><input id="blink" type="checkbox" checked> 自動眨眼</label>
        </section>
        <section>
          <small>SOURCE</small>
          <h2>26 全畫布圖層</h2>
          <p>agy(Nano Banana)同比例炸開圖 → manifest 自動切圖(flood 去背,格狀多點種子)→ layout 對齊 → pytoshop 組 PSD。黑長直、高挑蜂腰、深藍削肩洋裝美女角色,依 Cubism 骨架參考拆出獨立光頭底、眉毛、眼睛、嘴巴、腮紅。</p>
        </section>
        <section>
          <small>CURRENT STATE</small>
          <h2 id="state">IDLE</h2>
          <p id="hint">圖層載入中…</p>
        </section>
      </aside>
    </section>
  </main>
  <script src="lily_v1.js"></script>
</body>
</html>
