<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Carrot VTuber｜臉部九軸</title><link rel="stylesheet" href="style.css"></head><body><main><header><div><small>LIVE2D FACE LAB / 3 × 3</small><h1>臉部九軸角度測試</h1></div><b>● Angle X / Y active</b></header><section class="workspace"><section id="stage"><div id="face-rig">
<img data-x="-1" data-y="-1" src="../assets/face_9axis/up_left.png"><img data-x="0" data-y="-1" src="../assets/face_9axis/up_center.png"><img data-x="1" data-y="-1" src="../assets/face_9axis/up_right.png"><img data-x="-1" data-y="0" src="../assets/face_9axis/center_left.png"><img class="active" data-x="0" data-y="0" src="../assets/face_9axis/center.png"><img data-x="1" data-y="0" src="../assets/face_9axis/center_right.png"><img data-x="-1" data-y="1" src="../assets/face_9axis/down_left.png"><img data-x="0" data-y="1" src="../assets/face_9axis/down_center.png"><img data-x="1" data-y="1" src="../assets/face_9axis/down_right.png">
</div><div class="crosshair"><i></i></div><em>MOVE POINTER<br><span>左右轉頭／抬頭低頭</span></em></section><aside><section><small>ANGLE PARAMETERS</small><label>Angle X <output id="x-out">0</output><input id="angle-x" type="range" min="-1" max="1" step="1" value="0"></label><label>Angle Y <output id="y-out">0</output><input id="angle-y" type="range" min="-1" max="1" step="1" value="0"></label><label><input id="tracking" type="checkbox" checked>滑鼠自動追蹤</label></section><section><small>3 × 3 DEFORMATION MAP</small><div id="grid">↖<b>↑</b>↗<b>←</b><strong>●</strong><b>→</b>↙<b>↓</b>↘</div></section><section><small>CURRENT STATE</small><h2 id="state">CENTER</h2><p>使用九張實際角度圖，不是對單張正臉做 skew 或 scale。</p></section></aside></section></main><script src="app.js"></script></body></html>
